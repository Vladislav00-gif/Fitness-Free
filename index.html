    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }

    <div id="inlineDialog" class="inline-dialog modal-safe-pad">

    <script>
        let currentUser = null;
        let workouts = [];
        let categories = { "💪 Brust": [], "🏋️ Rücken": [], "🦵 Beine": [] };
        let exerciseMeta = {};
        let currentWorkoutExercises = [];
        let activeCategory = "💪 Brust";

        let monthlyStreak = 0;
        let lastStreakMonth = null;

        /** Pro Browser / Gerät: eigene Installations-ID → getrennte Daten & erneuter Namens-Schritt. */
        let deviceInstallId = null;

        function getOrCreateDeviceInstallId() {
            const key = "fitnessFree_installId";
            let id = localStorage.getItem(key);
            if (!id) {
                id = (typeof crypto !== "undefined" && crypto.randomUUID)
                    ? crypto.randomUUID()
                    : "ff_" + Date.now() + "_" + Math.random().toString(36).slice(2, 12);
                localStorage.setItem(key, id);
            }
            return id;
        }

        function userNameStorageKey() {
            return "fitnessFree_userName_" + deviceInstallId;
        }

        let overlayScrollLockActive = false;
        let overlaySavedScrollY = 0;

        function syncOverlayScrollLock() {
            const hm = document.getElementById("historyModal");
            const cm = document.getElementById("catalogModal");
            const id = document.getElementById("inlineDialog");
            const hist = hm && hm.style.display === "flex";
            const cat = cm && cm.style.display === "flex";
            const inl = id && id.style.display === "flex";
            const detail = document.querySelector(".workout-detail-overlay");
            const any = hist || cat || inl || !!(detail && detail.isConnected);
            if (any && !overlayScrollLockActive) {
                overlaySavedScrollY = window.scrollY || document.documentElement.scrollTop || 0;
                document.body.style.top = (-overlaySavedScrollY) + "px";
                document.body.classList.add("overlay-open");
                overlayScrollLockActive = true;
            } else if (!any && overlayScrollLockActive) {
                document.body.classList.remove("overlay-open");
                document.body.style.top = "";
                overlayScrollLockActive = false;
                window.scrollTo(0, overlaySavedScrollY);
                overlaySavedScrollY = 0;
            }
        }

        function roundHalf(num) { return Math.round(num * 2) / 2; }

        function initUser() {
            deviceInstallId = getOrCreateDeviceInstallId();
            const storedUser = localStorage.getItem(userNameStorageKey());
            if (storedUser && storedUser !== "null") {
                currentUser = storedUser;
                updateTitle();
                loadData();
            } else {
                askForName();
            }
        }

        function askForName() {
            const dialog = document.getElementById("inlineDialog");
            const skipBtn = document.getElementById("dialogSkipBtn");
            const hint = document.getElementById("dialogHint");
            document.getElementById("dialogTitle").innerText = "Willkommen bei Fitness Free";
            hint.classList.remove("hidden");
            hint.innerText = "Jedes Gerät hat eigene Daten. Name leer lassen oder „Ohne Namen“ = Titel bleibt „Fitness Free“.";
            skipBtn.classList.remove("hidden");
            const input = document.getElementById("dialogInput");
            input.placeholder = "";
            input.value = "";
            dialog.style.display = "flex";
            syncOverlayScrollLock();

            const applyName = (name) => {
                const trimmed = (name || "").trim();
                currentUser = trimmed === "" ? "Free" : trimmed;
                localStorage.setItem(userNameStorageKey(), currentUser);
                dialog.style.display = "none";
                syncOverlayScrollLock();
                skipBtn.classList.add("hidden");
                hint.classList.add("hidden");
                updateTitle();
                loadData();
            };

            document.getElementById("dialogConfirmBtn").onclick = () => applyName(input.value);
            document.getElementById("dialogSkipBtn").onclick = () => applyName("");
            document.getElementById("dialogCancelBtn").onclick = () => applyName("");
        }

        function updateTitle() {
            const titleElem = document.getElementById("appTitle");
            const docTitle = document.querySelector("title");
            if (currentUser && currentUser !== "Free") {
                titleElem.innerText = "Fitness " + currentUser;
                if (docTitle) docTitle.innerText = "Fitness " + currentUser + " | Monats-Streak";
            } else {
                titleElem.innerText = "Fitness Free";
                if (docTitle) docTitle.innerText = "Fitness Free | Monats-Streak";
            }
        }

        function getUserStorageKey() {
            return "fitnessFreeData_" + deviceInstallId + "_" + (currentUser || "guest");
        }

        function persistAll() {
            localStorage.setItem(getUserStorageKey(), JSON.stringify({ workouts, categories, exerciseMeta, monthlyStreak, lastStreakMonth }));
        }

        function initStreakForCurrentMonth() {
            const now = new Date();
            const currentMonthKey = now.getFullYear() + "-" + (now.getMonth() + 1);
            if (lastStreakMonth !== currentMonthKey) {
                monthlyStreak = 0;
                lastStreakMonth = currentMonthKey;
                persistAll();
            }
            updateStreakDisplay();
        }

        function updateStreakDisplay() {
            document.getElementById("monthStreakValue").innerText = monthlyStreak;
        }

        function incrementStreak() {
            const now = new Date();
            const currentMonthKey = now.getFullYear() + "-" + (now.getMonth() + 1);
            if (lastStreakMonth !== currentMonthKey) {
                monthlyStreak = 0;
                lastStreakMonth = currentMonthKey;
            }
            monthlyStreak++;
            persistAll();
            updateStreakDisplay();
        }

        function decrementStreak() {
            if (monthlyStreak > 0) {
                monthlyStreak--;
                persistAll();
                updateStreakDisplay();
            }
        }

        function loadData() {
            const stored = localStorage.getItem(getUserStorageKey());
            if (stored) {
                const parsed = JSON.parse(stored);
                workouts = parsed.workouts || [];
                categories = parsed.categories || { "💪 Brust": [], "🏋️ Rücken": [], "🦵 Beine": [] };
                exerciseMeta = parsed.exerciseMeta || {};
                monthlyStreak = parsed.monthlyStreak || 0;
                lastStreakMonth = parsed.lastStreakMonth || null;
                ensureDefaultCategories();
                syncHistoryFromWorkouts();
            } else {
                const today = new Date().toLocaleDateString("de-DE");
                workouts = [{
                    id: Date.now() - 86400000,
                    date: today + " 18:30",
                    exercises: [{ exerciseId: "ex1", exerciseName: "🏋️ Schrägbankdrücken", sets: [{ weight: 30.5, reps: 8 }, { weight: 34.0, reps: 4 }, { weight: 32.5, reps: 5 }] }]
                }];
                categories = { "💪 Brust": ["🏋️ Schrägbankdrücken", "🏋️ Flachbankdrücken"], "🏋️ Rücken": ["🤸 Klimmzüge", "🚣 Rudern"], "🦵 Beine": ["🦵 Kniebeugen", "🏋️ Kreuzheben"] };
                exerciseMeta = {
                    "🏋️ Schrägbankdrücken": { category: "💪 Brust", history: [] }, "🏋️ Flachbankdrücken": { category: "💪 Brust", history: [] },
                    "🤸 Klimmzüge": { category: "🏋️ Rücken", history: [] }, "🚣 Rudern": { category: "🏋️ Rücken", history: [] },
                    "🦵 Kniebeugen": { category: "🦵 Beine", history: [] }, "🏋️ Kreuzheben": { category: "🦵 Beine", history: [] }
                };
                monthlyStreak = 0;
                lastStreakMonth = null;
                syncHistoryFromWorkouts();
                persistAll();
            }
            initStreakForCurrentMonth();
            renderAll();
        }

        function ensureDefaultCategories() {
            ["💪 Brust", "🏋️ Rücken", "🦵 Beine"].forEach(function (c) { if (!categories[c]) categories[c] = []; });
        }

        function syncHistoryFromWorkouts() {
            for (let ex in exerciseMeta) exerciseMeta[ex].history = [];
            workouts.forEach(function (wo) {
                wo.exercises.forEach(function (ex) {
                    const exName = ex.exerciseName;
                    if (exerciseMeta[exName]) exerciseMeta[exName].history.push({ date: wo.date, sets: ex.sets });
                    else {
                        if (!exerciseMeta[exName]) {
                            exerciseMeta[exName] = { category: "📦 Andere", history: [] };
                            if (!categories["📦 Andere"]) categories["📦 Andere"] = [];
                            if (!categories["📦 Andere"].includes(exName)) categories["📦 Andere"].push(exName);
                        } else exerciseMeta[exName].history.push({ date: wo.date, sets: ex.sets });
                    }
                });
            });
            for (let cat in categories) categories[cat] = categories[cat].filter(function (ex) { return exerciseMeta[ex]; });
            for (let ex in exerciseMeta) {
                let cat = exerciseMeta[ex].category;
                if (cat && categories[cat] && !categories[cat].includes(ex)) categories[cat].push(ex);
                else if (cat && !categories[cat]) categories[cat] = [ex];
            }
            persistAll();
        }

        function showInputDialog(title, placeholder) {
            placeholder = placeholder || "";
            return new Promise(function (resolve) {
                const dialog = document.getElementById("inlineDialog");
                const skipBtn = document.getElementById("dialogSkipBtn");
                const hint = document.getElementById("dialogHint");
                skipBtn.classList.add("hidden");
                hint.classList.add("hidden");
                document.getElementById("dialogTitle").innerText = title;
                const input = document.getElementById("dialogInput");
                input.value = "";
                input.placeholder = placeholder;
                dialog.style.display = "flex";
                syncOverlayScrollLock();
                const confirm = function () { dialog.style.display = "none"; syncOverlayScrollLock(); resolve(input.value.trim() || null); };
                const cancel = function () { dialog.style.display = "none"; syncOverlayScrollLock(); resolve(null); };
                document.getElementById("dialogConfirmBtn").onclick = confirm;
                document.getElementById("dialogCancelBtn").onclick = cancel;
                document.getElementById("dialogSkipBtn").onclick = cancel;
                input.focus();
            });
        }

        function showConfirmDialog(title) {
            return new Promise(function (resolve) {
                const dialog = document.getElementById("inlineDialog");
                const skipBtn = document.getElementById("dialogSkipBtn");
                const hint = document.getElementById("dialogHint");
                skipBtn.classList.add("hidden");
                hint.classList.add("hidden");
                document.getElementById("dialogTitle").innerText = title;
                const input = document.getElementById("dialogInput");
                input.type = "text";
                input.placeholder = "Gib 'JA' ein";
                input.value = "";
                dialog.style.display = "flex";
                syncOverlayScrollLock();
                const confirm = function () { dialog.style.display = "none"; syncOverlayScrollLock(); resolve(input.value.toLowerCase() === "ja"); };
                const cancel = function () { dialog.style.display = "none"; syncOverlayScrollLock(); resolve(false); };
                document.getElementById("dialogConfirmBtn").onclick = confirm;
                document.getElementById("dialogCancelBtn").onclick = cancel;
                document.getElementById("dialogSkipBtn").onclick = cancel;
            });
        }

        async function finishWorkout() {
            if (currentWorkoutExercises.length === 0) { alert("Keine Übungen!"); return; }
            const newWorkout = { id: Date.now(), date: getDateTimeStr(), exercises: JSON.parse(JSON.stringify(currentWorkoutExercises)) };
            workouts.unshift(newWorkout);
            persistAll();
            newWorkout.exercises.forEach(function (ex) {
                if (!exerciseMeta[ex.exerciseName]) {
                    let defCat = "📦 Andere";
                    if (!categories[defCat]) categories[defCat] = [];
                    categories[defCat].push(ex.exerciseName);
                    exerciseMeta[ex.exerciseName] = { category: defCat, history: [] };
                }
                exerciseMeta[ex.exerciseName].history.unshift({ date: newWorkout.date, sets: ex.sets });
            });
            persistAll();
            syncHistoryFromWorkouts();
            currentWorkoutExercises = [];
            incrementStreak();
            renderAll();
            switchPage("dashboard");
        }

        async function deleteWorkout(workoutId) {
            const ok = await showConfirmDialog("Training löschen");
            if (ok) {
                const oldLength = workouts.length;
                workouts = workouts.filter(function (w) { return w.id !== workoutId; });
                if (workouts.length < oldLength) decrementStreak();
                persistAll();
                syncHistoryFromWorkouts();
                renderAll();
            }
        }

        async function deleteAllWorkouts() {
            const ok = await showConfirmDialog("ALLE Trainings löschen");
            if (ok) {
                const deletedCount = workouts.length;
                workouts = [];
                persistAll();
                syncHistoryFromWorkouts();
                for (let i = 0; i < deletedCount; i++) decrementStreak();
                renderAll();
            }
        }

        async function clearExerciseHistory(exName) {
            const ok = await showConfirmDialog("Historie löschen");
            if (ok && exerciseMeta[exName]) {
                const removedWorkouts = workouts.filter(function (wo) { return wo.exercises.some(function (ex) { return ex.exerciseName === exName; }); });
                const removeCount = removedWorkouts.length;
                workouts = workouts.filter(function (wo) { return !wo.exercises.some(function (ex) { return ex.exerciseName === exName; }); });
                exerciseMeta[exName].history = [];
                persistAll();
                syncHistoryFromWorkouts();
                for (let i = 0; i < removeCount; i++) decrementStreak();
                renderAll();
                document.getElementById("historyModal").style.display = "none";
                syncOverlayScrollLock();
            }
        }

        function addExerciseToCurrentWorkout(exName) {
            if (currentWorkoutExercises.some(function (e) { return e.exerciseName === exName; })) { alert("Bereits enthalten"); return; }
            currentWorkoutExercises.push({ exerciseId: "id_" + Date.now(), exerciseName: exName, sets: [{ weight: 20.0, reps: 8 }] });
            renderWorkoutPage();
        }

        function updateSet(exIdx, setIdx, field, delta) {
            let set = currentWorkoutExercises[exIdx].sets[setIdx];
            if (field === "weight") {
                let newVal = set.weight + delta;
                newVal = Math.max(0, roundHalf(newVal));
                set.weight = newVal;
            } else {
                let newReps = set.reps + delta;
                if (newReps >= 1) set.reps = newReps;
            }
            renderWorkoutPage();
        }

        function addSetToExercise(exIdx) {
            currentWorkoutExercises[exIdx].sets.push({ weight: 20.0, reps: 8 });
            renderWorkoutPage();
        }

        function removeSet(exIdx, setIdx) {
            currentWorkoutExercises[exIdx].sets.splice(setIdx, 1);
            if (currentWorkoutExercises[exIdx].sets.length === 0) currentWorkoutExercises.splice(exIdx, 1);
            renderWorkoutPage();
        }

        function removeExerciseFromWorkout(exIdx) {
            currentWorkoutExercises.splice(exIdx, 1);
            renderWorkoutPage();
        }
        window.removeExerciseFromWorkout = removeExerciseFromWorkout;

        function getDateTimeStr() {
            const d = new Date();
            return d.toLocaleDateString("de-DE") + " " + d.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
        }

        function renderDashboard() {
            const container = document.getElementById("recentWorkoutsList");
            if (!workouts.length) { container.innerHTML = "<div class=\"text-center py-10 text-stone-600\"><i class=\"fas fa-dumbbell\"></i> Keine Einheiten. Starte ein Training!</div>"; return; }
            container.innerHTML = workouts.slice(0, 8).map(function (wo) {
                return "<div class=\"workout-unit-card rounded-xl p-4 cursor-pointer\" data-id=\"" + wo.id + "\"><div class=\"flex justify-between items-center\"><div><i class=\"far fa-calendar-alt text-terracotta-600\"></i> <span class=\"font-mono\">" + wo.date + "</span></div><button class=\"delete-workout-btn text-red-700 hover:text-red-900 text-sm px-2\" data-id=\"" + wo.id + "\"><i class=\"fas fa-trash-alt\"></i></button></div><div class=\"mt-2 text-stone-600 text-sm flex gap-2 flex-wrap\">" + wo.exercises.map(function (ex) { return "<span>🏋️ " + ex.exerciseName + "</span>"; }).join(" • ") + "</div></div>";
            }).join("");
            document.querySelectorAll(".delete-workout-btn").forEach(function (btn) {
                btn.addEventListener("click", function (e) { e.stopPropagation(); deleteWorkout(parseInt(btn.dataset.id, 10)); });
            });
            document.querySelectorAll("[data-id].workout-unit-card").forEach(function (el) {
                el.addEventListener("click", function (e) {
                    if (e.target.closest(".delete-workout-btn")) return;
                    const id = parseInt(el.dataset.id, 10);
                    const wo = workouts.find(function (w) { return w.id === id; });
                    if (wo) showWorkoutDetailModal(wo);
                });
            });
        }

        function showWorkoutDetailModal(workout) {
            let modal = document.createElement("div");
            modal.className = "workout-detail-overlay fixed inset-0 z-50 flex items-center justify-center modal-overlay modal-safe-pad";
            modal.innerHTML = "<div class=\"glass-card rounded-2xl w-full max-w-lg modal-panel overflow-auto p-4 sm:p-5\"><div class=\"flex justify-between items-start gap-2\"><h3 class=\"text-lg sm:text-xl font-bold min-w-0\">Training vom " + workout.date + "</h3><button type=\"button\" class=\"closeDetail tap-close text-red-700 text-2xl leading-none rounded-lg shrink-0\" aria-label=\"Schließen\">&times;</button></div><div class=\"space-y-4 mt-3\">" + workout.exercises.map(function (ex) {
                return "<div class=\"border-l-4 border-terracotta-500 pl-3\"><div class=\"font-bold\">" + ex.exerciseName + "</div>" + ex.sets.map(function (s, i) { return "<div>Satz " + (i + 1) + ": " + s.weight + " kg × " + s.reps + " Wdh</div>"; }).join("") + "</div>";
            }).join("") + "</div></div>";
            document.body.appendChild(modal);
            syncOverlayScrollLock();
            modal.querySelector(".closeDetail").onclick = function () { modal.remove(); syncOverlayScrollLock(); };
        }

        function renderWorkoutPage() {
            const container = document.getElementById("workoutExercisesContainer");
            if (!currentWorkoutExercises.length) { container.innerHTML = "<div class=\"text-gray-600 text-center py-8\"><i class=\"fas fa-plus-circle\"></i> Keine Übungen. Katalog öffnen.</div>"; return; }
            container.innerHTML = currentWorkoutExercises.map(function (ex, exIdx) {
                return "<div class=\"glass-card rounded-xl p-3\"><div class=\"flex justify-between items-center mb-2 gap-2\"><span class=\"font-bold text-base sm:text-lg min-w-0 break-words\">" + ex.exerciseName + "</span><button type=\"button\" onclick=\"removeExerciseFromWorkout(" + exIdx + ")\" class=\"text-red-600 tap-close p-2 shrink-0\" aria-label=\"Übung entfernen\"><i class=\"fas fa-trash\"></i></button></div><div class=\"space-y-2\">" + ex.sets.map(function (set, setIdx) {
                    return "<div class=\"flex flex-wrap items-center gap-2 sm:gap-3 bg-amber-50/60 p-2 rounded-lg justify-between\"><span class=\"text-xs w-8 shrink-0 text-center font-bold\">" + (setIdx + 1) + "</span><div class=\"flex items-center gap-1 bg-amber-100 px-1.5 py-1 rounded-full\"><button type=\"button\" class=\"stepper-btn rounded-full\" data-ex=\"" + exIdx + "\" data-set=\"" + setIdx + "\" data-field=\"weight\" data-dir=\"-0.5\">-0.5</button><span class=\"w-14 sm:w-16 text-center font-bold text-sm shrink-0\">" + set.weight + " kg</span><button type=\"button\" class=\"stepper-btn rounded-full\" data-ex=\"" + exIdx + "\" data-set=\"" + setIdx + "\" data-field=\"weight\" data-dir=\"0.5\">+0.5</button></div><div class=\"flex items-center gap-1 bg-amber-100 px-1.5 py-1 rounded-full\"><button type=\"button\" class=\"stepper-btn rounded-full\" data-ex=\"" + exIdx + "\" data-set=\"" + setIdx + "\" data-field=\"reps\" data-dir=\"-1\">-1</button><span class=\"w-11 sm:w-12 text-center font-bold text-sm shrink-0\">" + set.reps + " Wdh</span><button type=\"button\" class=\"stepper-btn rounded-full\" data-ex=\"" + exIdx + "\" data-set=\"" + setIdx + "\" data-field=\"reps\" data-dir=\"1\">+1</button></div><button type=\"button\" class=\"text-red-600 tap-close p-1\" data-remove-set=\"" + exIdx + "|" + setIdx + "\" aria-label=\"Satz entfernen\"><i class=\"fas fa-minus-circle text-lg\"></i></button></div>";
                }).join("") + "<button type=\"button\" class=\"text-terracotta-600 text-sm mt-2 py-2 min-h-[2.75rem] inline-flex items-center\" data-add-set=\"" + exIdx + "\"><i class=\"fas fa-plus\"></i> Satz hinzufügen</button></div></div>";
            }).join("");
            attachEvents();
        }

        function attachEvents() {
            document.querySelectorAll(".stepper-btn").forEach(function (btn) {
                btn.addEventListener("click", function () {
                    let ex = parseInt(btn.dataset.ex, 10), si = parseInt(btn.dataset.set, 10), field = btn.dataset.field, dir = parseFloat(btn.dataset.dir);
                    updateSet(ex, si, field, dir);
                });
            });
            document.querySelectorAll("[data-add-set]").forEach(function (btn) { btn.addEventListener("click", function () { addSetToExercise(parseInt(btn.dataset.addSet, 10)); }); });
            document.querySelectorAll("[data-remove-set]").forEach(function (btn) {
                btn.addEventListener("click", function () {
                    let parts = btn.dataset.removeSet.split("|");
                    removeSet(parseInt(parts[0], 10), parseInt(parts[1], 10));
                });
            });
        }

        async function addCustomCategory() {
            const name = await showInputDialog("Neue Kategorie", "z.B. Schultern");
            if (name && !categories[name]) { categories[name] = []; persistAll(); renderLibrary(); }
        }

        async function addCustomExercise() {
            const name = await showInputDialog("Übungsname", "z.B. Schulterdrücken");
            if (name && !exerciseMeta[name]) {
                const cat = await showInputDialog("Kategorie (bestehend oder neu)", "z.B. Schultern");
                let targetCat = cat || "📦 Andere";
                if (!categories[targetCat]) categories[targetCat] = [];
                categories[targetCat].push(name);
                exerciseMeta[name] = { category: targetCat, history: [] };
                persistAll();
                renderLibrary();
            }
        }

        async function deleteCategory(catName) {
            if (catName === "💪 Brust" || catName === "🏋️ Rücken" || catName === "🦵 Beine") { alert("Standardkategorien bleiben"); return; }
            const ok = await showConfirmDialog("Kategorie löschen");
            if (ok) {
                (categories[catName] || []).forEach(function (ex) { delete exerciseMeta[ex]; });
                delete categories[catName];
                if (activeCategory === catName) activeCategory = Object.keys(categories)[0];
                persistAll();
                renderLibrary();
            }
        }

        async function deleteExerciseFromCategory(exName, category) {
            const ok = await showConfirmDialog("Übung löschen");
            if (ok) {
                delete exerciseMeta[exName];
                if (categories[category]) categories[category] = categories[category].filter(function (e) { return e !== exName; });
                const beforeIds = new Set(workouts.map(function (w) { return w.id; }));
                workouts.forEach(function (wo) { wo.exercises = wo.exercises.filter(function (ex) { return ex.exerciseName !== exName; }); });
                workouts = workouts.filter(function (wo) { return wo.exercises.length > 0; });
                const afterIds = new Set(workouts.map(function (w) { return w.id; }));
                let removedSessions = 0;
                beforeIds.forEach(function (id) { if (!afterIds.has(id)) removedSessions++; });
                for (let i = 0; i < removedSessions; i++) decrementStreak();
                persistAll();
                syncHistoryFromWorkouts();
                renderLibrary();
                renderDashboard();
            }
        }

        function renderLibrary() {
            const tabs = Object.keys(categories);
            document.getElementById("categoriesTabs").innerHTML = tabs.map(function (cat) {
                return "<div class=\"flex items-center gap-1\"><button class=\"category-badge px-4 py-1.5 rounded-full text-sm " + (activeCategory === cat ? "category-badge-active" : "") + "\" data-cat=\"" + cat + "\">" + cat + " (" + categories[cat].length + ")</button>" + (!cat.includes("Brust") && !cat.includes("Rücken") && !cat.includes("Beine") ? "<button data-delcat=\"" + cat + "\" class=\"text-red-600 hover:text-red-800 ml-1 text-xs w-6 h-6 rounded-full\"><i class=\"fas fa-times-circle\"></i></button>" : "") + "</div>";
            }).join("");
            document.querySelectorAll("[data-cat]").forEach(function (btn) { btn.addEventListener("click", function () { activeCategory = btn.dataset.cat; renderLibrary(); }); });
            document.querySelectorAll("[data-delcat]").forEach(function (btn) { btn.addEventListener("click", function () { deleteCategory(btn.dataset.delcat); }); });
            const exList = categories[activeCategory] || [];
            const container = document.getElementById("exercisesByCategory");
            if (!exList.length) { container.innerHTML = "<div class=\"col-span-2 text-center py-8 text-stone-500\">Keine Übungen</div>"; return; }
            container.innerHTML = exList.map(function (exName) {
                return "<div class=\"glass-card p-3 rounded-xl flex justify-between items-center group\"><div class=\"flex items-center gap-2 cursor-pointer flex-1\" data-exname=\"" + exName + "\"><i class=\"fas fa-dumbbell text-terracotta-600\"></i><span>" + exName + "</span></div><div class=\"flex gap-2\"><button data-del-ex=\"" + exName + "\" data-cat=\"" + activeCategory + "\" class=\"text-red-600 hover:text-red-800\"><i class=\"fas fa-trash-alt\"></i></button><i class=\"fas fa-chart-line text-stone-600 cursor-pointer\" data-exname=\"" + exName + "\"></i></div></div>";
            }).join("");
            document.querySelectorAll("[data-exname].cursor-pointer").forEach(function (el) { el.addEventListener("click", function () { showExerciseHistory(el.dataset.exname); }); });
            document.querySelectorAll(".fa-chart-line[data-exname]").forEach(function (el) { el.addEventListener("click", function () { showExerciseHistory(el.dataset.exname); }); });
            document.querySelectorAll("[data-del-ex]").forEach(function (btn) {
                btn.addEventListener("click", function (e) { e.stopPropagation(); deleteExerciseFromCategory(btn.dataset.delEx, btn.dataset.cat); });
            });
        }

        function showExerciseHistory(exName) {
            const meta = exerciseMeta[exName];
            if (!meta) return;
            document.getElementById("modalExName").innerText = exName;
            const content = document.getElementById("modalHistoryContent");
            content.innerHTML = (!meta.history.length) ? "<div class=\"text-center py-6\">Keine Historie</div>" : meta.history.map(function (h) {
                return "<div class=\"bg-amber-50 p-3 rounded-lg\"><div class=\"text-terracotta-700 text-sm\">📅 " + h.date + "</div>" + h.sets.map(function (s, i) { return "<div class=\"text-sm flex justify-between\"><span>Satz " + (i + 1) + "</span><span>" + s.weight + " kg x " + s.reps + " Wdh</span></div>"; }).join("") + "</div>";
            }).join("");
            document.getElementById("historyModal").style.display = "flex";
            syncOverlayScrollLock();
            document.getElementById("clearExHistoryBtn").onclick = function () { clearExerciseHistory(exName); };
        }

        function openCatalogModal() {
            const allEx = Object.keys(exerciseMeta);
            const container = document.getElementById("catalogExercisesList");
            const renderList = function (filter) {
                filter = filter || "";
                const filtered = allEx.filter(function (ex) { return ex.toLowerCase().includes(filter.toLowerCase()); });
                container.innerHTML = filtered.map(function (ex) {
                    return "<div class=\"flex flex-wrap items-center gap-2 p-2 active:bg-amber-100/80 rounded-lg\"><span class=\"min-w-0 flex-1 pr-2\">" + ex + "</span><button type=\"button\" data-add=\"" + ex + "\" class=\"btn-primary text-white px-4 py-2.5 rounded-lg text-sm shrink-0 min-h-[2.75rem]\">+ Hinzufügen</button></div>";
                }).join("");
                document.querySelectorAll("[data-add]").forEach(function (btn) {
                    btn.addEventListener("click", function () {
                        addExerciseToCurrentWorkout(btn.dataset.add);
                        document.getElementById("catalogModal").style.display = "none";
                        syncOverlayScrollLock();
                    });
                });
            };
            renderList();
            document.getElementById("catalogSearch").oninput = function (e) { renderList(e.target.value); };
            document.getElementById("catalogModal").style.display = "flex";
            syncOverlayScrollLock();
        }

        function switchPage(page) {
            document.querySelectorAll(".page").forEach(function (p) { p.classList.remove("active-page"); });
            document.getElementById(page + "Page").classList.add("active-page");
            document.querySelectorAll(".nav-btn").forEach(function (b) { b.classList.remove("nav-active"); });
            if (page === "dashboard") document.getElementById("navDashboardBtn").classList.add("nav-active");
            else if (page === "workout") document.getElementById("navWorkoutBtn").classList.add("nav-active");
            else document.getElementById("navLibraryBtn").classList.add("nav-active");
            renderAll();
        }

        function renderAll() {
            renderDashboard();
            renderWorkoutPage();
            renderLibrary();
            document.getElementById("dateToday").innerHTML = new Date().toLocaleDateString("de-DE");
            updateStreakDisplay();
        }

        document.getElementById("navDashboardBtn").onclick = function () { switchPage("dashboard"); };
        document.getElementById("navWorkoutBtn").onclick = function () { switchPage("workout"); };
        document.getElementById("navLibraryBtn").onclick = function () { switchPage("library"); };
        document.getElementById("newWorkoutFromDashBtn").onclick = function () {
            if (currentWorkoutExercises.length && !confirm("Aktuelle Einheit zurücksetzen?")) return;
            currentWorkoutExercises = [];
            switchPage("workout");
        };
        document.getElementById("openExerciseCatalogBtn").onclick = openCatalogModal;
        document.getElementById("finishWorkoutBtn").onclick = finishWorkout;
        document.getElementById("discardWorkoutBtn").onclick = function () {
            if (confirm("Verwerfen?")) { currentWorkoutExercises = []; renderWorkoutPage(); }
        };
        document.getElementById("addCategoryBtn").onclick = addCustomCategory;
        document.getElementById("addExerciseToLibBtn").onclick = addCustomExercise;
        document.getElementById("closeModalBtn").onclick = function () { document.getElementById("historyModal").style.display = "none"; syncOverlayScrollLock(); };
        document.getElementById("closeCatalogBtn").onclick = function () { document.getElementById("catalogModal").style.display = "none"; syncOverlayScrollLock(); };
        document.getElementById("closeCatalogFooterBtn").onclick = function () { document.getElementById("catalogModal").style.display = "none"; syncOverlayScrollLock(); };
        document.getElementById("clearAllWorkoutsBtn").onclick = deleteAllWorkouts;
        window.onclick = function (e) {
            if (e.target === document.getElementById("historyModal")) { document.getElementById("historyModal").style.display = "none"; syncOverlayScrollLock(); }
            if (e.target === document.getElementById("catalogModal")) { document.getElementById("catalogModal").style.display = "none"; syncOverlayScrollLock(); }
        };

        initUser();
    </script>
</body>
</html>
